<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통TONG · 대면 통역</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{height:100%;font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    background:#f0fbf7;color:#134e4a;overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;}
  .screen{flex:1;display:none;flex-direction:column;min-height:0;}
  .screen.active{display:flex;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:26px;text-align:center;}
  .sub{color:#5b8578;font-size:14px;line-height:1.6;}
  .logo{display:flex;align-items:center;gap:6px;justify-content:center;}
  .logo svg{height:52px;width:auto;}
  .logo .word{font-size:30px;font-weight:800;background:linear-gradient(135deg,#10b981,#0ea5a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
  select{background:#fff;color:#134e4a;border:1px solid #d9f2e9;border-radius:14px;padding:12px 14px;font-size:16px;width:100%;max-width:280px;box-shadow:0 3px 10px rgba(16,90,80,.06);}
  .btn{background:linear-gradient(135deg,#10b981,#0ea5a3);color:#fff;border:none;border-radius:14px;padding:15px 22px;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:280px;box-shadow:0 5px 14px rgba(16,185,129,.35);}
  .btn.sec{background:#fff;color:#0ea5a3;border:1.5px solid #0ea5a3;box-shadow:none;}
  .btn:active{transform:scale(.98);}
  #qrbox{background:#fff;padding:14px;border-radius:16px;display:inline-block;box-shadow:0 6px 16px rgba(16,90,80,.1);}
  .code{font-size:26px;font-weight:800;letter-spacing:6px;background:linear-gradient(135deg,#10b981,#0ea5a3);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .top{display:flex;align-items:center;gap:10px;padding:13px 16px;background:linear-gradient(135deg,#10b981,#0ea5a3);color:#fff;}
  .dot{width:9px;height:9px;border-radius:50%;background:#fca5a5;flex:none;}
  .dot.on{background:#b9fbd9;}
  .top b{font-weight:700;font-size:15px;}
  .chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
  .msg{max-width:82%;padding:10px 13px;border-radius:4px 18px 18px 18px;font-size:16px;line-height:1.4;word-break:break-word;
    background:#fff;color:#134e4a;align-self:flex-start;box-shadow:0 2px 6px rgba(16,90,80,.08);}
  .msg.mine{align-self:flex-end;background:#10b981;color:#fff;border-radius:18px 4px 18px 18px;box-shadow:0 3px 8px rgba(16,185,129,.3);}
  .msg .orig{display:block;font-size:11px;opacity:.6;margin-top:3px;}
  .foot{padding:10px 12px 14px;background:#fff;border-top:1px solid #d9f2e9;display:flex;flex-direction:column;gap:6px;}
  .row{display:flex;gap:8px;}
  #textIn{flex:1;background:#eef7f3;color:#134e4a;border:1px solid #d9f2e9;border-radius:22px;padding:12px 16px;font-size:16px;}
  #textIn::placeholder{color:#7aa396;font-size:13px;}
  .send{background:linear-gradient(135deg,#10b981,#0ea5a3);color:#fff;border:none;border-radius:50%;width:46px;height:46px;font-size:17px;flex:none;box-shadow:0 3px 8px rgba(16,185,129,.35);}
  .status{font-size:12px;color:#5b8578;text-align:center;min-height:15px;}
  .guide{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:24px;text-align:center;}
  .guide .gi{font-size:34px;opacity:.45;margin-bottom:2px;}
  .guide .gt{color:#9ab8ac;font-size:15px;line-height:1.6;}
  .guide .garrow{font-size:26px;color:#9ab8ac;opacity:.7;margin-top:10px;animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
</style>
</head>
<body>
<div class="app">

  <div class="screen active" id="s-setup">
    <div class="center">
      <div class="logo">
        <svg viewBox="0 0 140 150"><defs><linearGradient id="m" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10B981"/><stop offset="1" stop-color="#0EA5A3"/></linearGradient></defs>
          <g transform="translate(48,86)"><circle cx="0" cy="-8" r="34" fill="url(#m)"/><circle cx="12" cy="-16" r="4.5" fill="#fff"/><path d="M 8 0 Q 18 6 26 -2" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M -30 52 Q -30 22 0 22 Q 30 22 30 52 Z" fill="url(#m)"/><path d="M 44 -14 Q 52 -8 44 -2" stroke="#10B981" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M 56 -22 Q 70 -8 56 6" stroke="#0EA5A3" stroke-width="5" fill="none" stroke-linecap="round" opacity=".65"/></g>
        </svg>
        <span class="word">통TONG</span>
        <svg viewBox="0 0 140 150" style="transform:scaleX(-1)"><g transform="translate(48,86)"><circle cx="0" cy="-8" r="34" fill="url(#m)"/><circle cx="12" cy="-16" r="4.5" fill="#fff"/><path d="M 8 0 Q 18 6 26 -2" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M -30 52 Q -30 22 0 22 Q 30 22 30 52 Z" fill="url(#m)"/><path d="M 44 -14 Q 52 -8 44 -2" stroke="#10B981" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M 56 -22 Q 70 -8 56 6" stroke="#0EA5A3" stroke-width="5" fill="none" stroke-linecap="round" opacity=".65"/></g></svg>
      </div>
      <div class="sub" id="setupSub">서로의 말을 실시간으로 통역해요.<br>먼저 내 언어를 골라주세요.<br><span style="opacity:.65">We translate for each other in real time.<br>First, choose your language.</span></div>
      <select id="myLang">
        <option value="ko">한국어</option><option value="en">English</option>
        <option value="ja">日本語</option><option value="zh">中文</option>
        <option value="es">Español</option><option value="fr">Français</option>
        <option value="vi">Tiếng Việt</option><option value="th">ไทย</option>
      </select>
      <button class="btn" id="startBtn">대화 시작 · Start</button>
      <div style="opacity:.4;font-size:11px">버전 v16</div>
    </div>
  </div>

  <div class="screen" id="s-invite">
    <div class="center">
      <div class="logo"><span class="word" style="font-size:22px">통TONG</span></div>
      <div class="sub">상대가 QR을 카메라로 찍으면 바로 연결돼요.<br><span style="opacity:.65">Have the other person scan this QR with their camera.</span></div>
      <div id="qrbox"></div>
      <div class="code" id="codeTxt"></div>
      <button class="btn sec" id="copyBtn">링크 복사 · Copy link</button>
      <div class="sub" id="waitMsg">상대 연결을 기다리는 중…</div>
    </div>
  </div>

  <div class="screen" id="s-chat">
    <div class="top"><span class="dot" id="dot"></span><b id="peerInfo">연결 중…</b></div>
    <div class="chat" id="chat">
      <div class="guide" id="guide">
        <div class="gi">⌨️ 🎤</div>
        <div class="gt"><span id="gType">아래 칸에 문자로 입력하거나</span><br><span id="gMic">키보드의 마이크를 누르고 말해주세요</span></div>
        <div class="garrow">↓</div>
      </div>
    </div>
    <div class="foot">
      <div class="row">
        <input id="textIn" placeholder="문자로 입력하거나, 키보드의 🎤 마이크를 누르고 말해주세요" autocomplete="off">
        <button class="send" id="sendBtn">➤</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const LOCALE={ko:'ko-KR',en:'en-US',ja:'ja-JP',zh:'zh-CN',es:'es-ES',fr:'fr-FR',vi:'vi-VN',th:'th-TH'};
const LABEL={ko:'한국어',en:'English',ja:'日本語',zh:'中文',es:'Español',fr:'Français',vi:'Tiếng Việt',th:'ไทย'};
const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}

const myId=Math.random().toString(36).slice(2,10);
let myLang='ko', peerLang=null, client=null, topic=null, acked=false;

// 폰/브라우저의 언어를 기본값으로 자동 선택 (일본 폰이면 日本語가 미리 골라짐)
const navLang=(navigator.language||'en').slice(0,2);
if(LOCALE[navLang]) document.getElementById('myLang').value=navLang;

const params=new URLSearchParams(location.search);
let room=params.get('room');
if(room){ $('setupSub').innerHTML='초대를 받았어요! 내 언어만 고르면 바로 연결돼요.<br><span style="opacity:.65">You\'re invited! Just pick your language to connect.</span>'; $('startBtn').textContent='연결하기 · Connect'; }

// 안내문구를 내가 고른 언어로 표시
const PLACEHOLDER={ko:'메시지 입력',en:'Message',ja:'メッセージ',zh:'输入消息',es:'Mensaje',fr:'Message',vi:'Tin nhắn',th:'ข้อความ'};
const GUIDE_TYPE={
  ko:'아래 칸에 문자로 입력하거나', en:'Type in the box below, or',
  ja:'下の欄に文字を入力するか', zh:'在下方输入文字，或',
  es:'Escribe en el cuadro de abajo o', fr:'Écrivez dans la case ci-dessous ou',
  vi:'Nhập chữ vào ô bên dưới hoặc', th:'พิมพ์ข้อความในช่องด้านล่าง หรือ'
};
const GUIDE_MIC={
  ko:'키보드의 마이크를 누르고 말해주세요', en:'tap the mic on your keyboard and speak',
  ja:'キーボードのマイクを押して話してください', zh:'按键盘上的麦克风说话',
  es:'pulsa el micrófono del teclado y habla', fr:'appuyez sur le micro du clavier et parlez',
  vi:'nhấn micro trên bàn phím và nói', th:'กดไมค์บนแป้นพิมพ์แล้วพูด'
};
function applyLangUI(){
  $('textIn').placeholder = PLACEHOLDER[myLang] || PLACEHOLDER.en;
  $('gType').textContent = GUIDE_TYPE[myLang] || GUIDE_TYPE.en;
  $('gMic').textContent = GUIDE_MIC[myLang] || GUIDE_MIC.en;
}

async function translate(text,from,to){
  if(from===to)return text;
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const j=await r.json();
    return j?.responseData?.translatedText||text;
  }catch(e){return text;}
}
function speak(text,lang){try{const u=new SpeechSynthesisUtterance(text);u.lang=LOCALE[lang]||'en-US';speechSynthesis.speak(u);}catch(e){}}
function addMsg(main,orig,mine){
  const g=$('guide'); if(g) g.remove();      // 첫 메시지가 오면 안내 카드 제거
  const d=document.createElement('div');
  d.className='msg'+(mine?' mine':'');
  d.innerHTML=`<span></span>`+(orig&&orig!==main?`<span class="orig"></span>`:'');
  d.children[0].textContent=main;
  if(d.children[1]) d.children[1].textContent=orig;
  $('chat').appendChild(d);$('chat').scrollTop=$('chat').scrollHeight;
}

function pub(obj){ obj.id=myId; client&&client.publish(topic, JSON.stringify(obj)); }

async function onMsg(raw){
  let d; try{d=JSON.parse(raw);}catch(e){return;}
  if(d.id===myId) return;
  if(d.type==='hello'){
    peerLang=d.lang; $('peerInfo').textContent='상대: '+(LABEL[peerLang]||peerLang);
    show('s-chat');
    setTimeout(()=>$('textIn').focus(),300);
    if(!acked){ acked=true; pub({type:'hello',lang:myLang}); }
    return;
  }
  if(d.type==='msg'){
    const t=await translate(d.text, d.lang, myLang);
    addMsg(t, d.text, false); speak(t, myLang);
  }
}

function connect(){
  if(!window.mqtt){ $('status').textContent='연결 라이브러리 로드 실패 — 새로고침'; return; }
  topic='tongtong2026/'+room;
  client=mqtt.connect('wss://broker.emqx.io:8084/mqtt',{clientId:'tt_'+myId,clean:true,connectTimeout:8000,reconnectPeriod:3000});
  client.on('connect',()=>{
    $('dot').classList.add('on');
    client.subscribe(topic,()=>{ pub({type:'hello',lang:myLang}); });
  });
  client.on('message',(t,payload)=>onMsg(payload.toString()));
  client.on('reconnect',()=>$('status').textContent='재연결 중…');
  client.on('error',e=>$('status').textContent='연결 오류 — 잠시 후 재시도');
}

$('startBtn').onclick=()=>{
  myLang=$('myLang').value;
  applyLangUI();
  if(!room){
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    room=Array.from({length:5},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
    const link=location.origin+location.pathname+'?room='+room;
    show('s-invite');
    new QRCode($('qrbox'),{text:link,width:190,height:190,colorDark:'#134e4a'});
    $('codeTxt').textContent=room;
    $('copyBtn').onclick=()=>{navigator.clipboard?.writeText(link);$('copyBtn').textContent='복사됨! · Copied!';};
  }else{
    show('s-chat');
    setTimeout(()=>$('textIn').focus(),300);
  }
  connect();
};

function sendText(){
  const v=$('textIn').value.trim(); if(!v)return;
  addMsg(v,'',true); pub({type:'msg',text:v,lang:myLang}); $('textIn').value='';
}
$('sendBtn').onclick=sendText;
$('textIn').addEventListener('keydown',e=>{if(e.key==='Enter')sendText();});
</script>
</body>
</html>
