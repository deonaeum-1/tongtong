<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통통 · 대면 통역</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    background:#0a0f1c;color:#e8eefc;overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;}
  .screen{flex:1;display:none;flex-direction:column;min-height:0;}
  .screen.active{display:flex;}
  h1{font-size:20px;margin:0;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:26px;text-align:center;}
  .sub{color:#8ea3c9;font-size:14px;line-height:1.6;}
  select{background:#182338;color:#e8eefc;border:1px solid #26344f;border-radius:12px;padding:12px 14px;font-size:16px;width:100%;max-width:280px;}
  .btn{background:#2563eb;color:#fff;border:none;border-radius:14px;padding:15px 22px;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:280px;}
  .btn.sec{background:#182338;border:1px solid #26344f;}
  .btn:active{transform:scale(.98);}
  #qrbox{background:#fff;padding:14px;border-radius:14px;display:inline-block;}
  .code{font-family:monospace;font-size:15px;letter-spacing:2px;color:#e8eefc;background:#182338;padding:8px 14px;border-radius:10px;}
  .top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #26344f;}
  .dot{width:9px;height:9px;border-radius:50%;background:#ef4444;flex:none;}
  .dot.on{background:#22c55e;}
  .chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
  .msg{max-width:82%;padding:9px 13px;border-radius:16px;font-size:16px;line-height:1.35;word-break:break-word;background:#182338;align-self:flex-start;}
  .msg.mine{align-self:flex-end;background:#2563eb;}
  .msg .orig{display:block;font-size:11px;opacity:.55;margin-top:3px;}
  .foot{padding:10px 12px 14px;border-top:1px solid #26344f;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;gap:8px;}
  #textIn{flex:1;background:#182338;color:#e8eefc;border:1px solid #26344f;border-radius:12px;padding:12px;font-size:16px;}
  .send{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:0 16px;font-size:16px;font-weight:700;}
  .mic{width:100%;background:#0ea5e9;color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
  .mic.live{background:#ef4444;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .status{font-size:12px;color:#8ea3c9;text-align:center;min-height:15px;}
</style>
</head>
<body>
<div class="app">

  <div class="screen active" id="s-setup">
    <div class="center">
      <h1>🗣️ 통통</h1>
      <div class="sub" id="setupSub">서로의 말을 실시간으로 통역해요.<br>먼저 내 언어를 골라주세요.</div>
      <select id="myLang">
        <option value="ko">한국어</option><option value="en">English</option>
        <option value="ja">日本語</option><option value="zh">中文</option>
        <option value="es">Español</option><option value="fr">Français</option>
        <option value="vi">Tiếng Việt</option><option value="th">ไทย</option>
      </select>
      <button class="btn" id="startBtn">대화 시작</button>
    </div>
  </div>

  <div class="screen" id="s-invite">
    <div class="center">
      <h1>상대를 초대하세요</h1>
      <div class="sub">상대가 QR을 카메라로 찍으면 바로 연결돼요.</div>
      <div id="qrbox"></div>
      <div class="code" id="codeTxt"></div>
      <button class="btn sec" id="copyBtn">링크 복사</button>
      <div class="sub" id="waitMsg">상대 연결을 기다리는 중…</div>
    </div>
  </div>

  <div class="screen" id="s-chat">
    <div class="top"><span class="dot" id="dot"></span><b id="peerInfo">연결 중…</b></div>
    <div class="chat" id="chat"></div>
    <div class="foot">
      <div class="row">
        <input id="textIn" placeholder="여기에 입력하고 전송" autocomplete="off">
        <button class="send" id="sendBtn">전송</button>
      </div>
      <button class="mic" id="mic">🎤 눌러서 말하기 (음성)</button>
      <div class="status" id="status"></div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/mqtt@5/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const LOCALE={ko:'ko-KR',en:'en-US',ja:'ja-JP',zh:'zh-CN',es:'es-ES',fr:'fr-FR',vi:'vi-VN',th:'th-TH'};
const LABEL={ko:'한국어',en:'English',ja:'日本語',zh:'中文',es:'Español',fr:'Français',vi:'Tiếng Việt',th:'ไทย'};
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}

const myId=Math.random().toString(36).slice(2,10);
let myLang='ko', peerLang=null, client=null, topic=null, acked=false;

const params=new URLSearchParams(location.search);
let room=params.get('room');
if(room){ $('setupSub').innerHTML='초대를 받았어요! 내 언어만 고르면 바로 연결돼요.'; $('startBtn').textContent='연결하기'; }

async function translate(text,from,to){
  if(from===to)return text;
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const j=await r.json();
    return j?.responseData?.translatedText||text;
  }catch(e){return text;}
}
function speak(text,lang){try{const u=new SpeechSynthesisUtterance(text);u.lang=LOCALE[lang]||'en-US';speechSynthesis.speak(u);}catch(e){}}
function addMsg(main,orig,mine){
  const d=document.createElement('div');
  d.className='msg'+(mine?' mine':'');
  d.innerHTML=`<span>${main}</span>`+(orig&&orig!==main?`<span class="orig">${orig}</span>`:'');
  $('chat').appendChild(d);$('chat').scrollTop=$('chat').scrollHeight;
}

function pub(obj){ obj.id=myId; client&&client.publish(topic, JSON.stringify(obj)); }

async function onMsg(raw){
  let d; try{d=JSON.parse(raw);}catch(e){return;}
  if(d.id===myId) return;                       // 내 메시지는 무시
  if(d.type==='hello'){
    peerLang=d.lang; $('peerInfo').textContent='상대: '+(LABEL[peerLang]||peerLang);
    show('s-chat');
    if(!acked){ acked=true; pub({type:'hello',lang:myLang}); }  // 나도 언어 알려주기
    return;
  }
  if(d.type==='msg'){
    const t=await translate(d.text, d.lang, myLang);
    addMsg(t, d.text, false); speak(t, myLang);
  }
}

function connect(){
  if(!window.mqtt){ $('status').textContent='연결 라이브러리 로드 실패 — 새로고침'; return; }
  topic='tongtong2026/'+room;
  client=mqtt.connect('wss://broker.emqx.io:8084/mqtt',{clientId:'tt_'+myId,clean:true,connectTimeout:8000,reconnectPeriod:3000});
  client.on('connect',()=>{
    $('dot').classList.add('on');
    client.subscribe(topic,()=>{ pub({type:'hello',lang:myLang}); });
    if(!room?false:true){} // noop
  });
  client.on('message',(t,payload)=>onMsg(payload.toString()));
  client.on('reconnect',()=>$('status').textContent='재연결 중…');
  client.on('error',e=>$('status').textContent='연결 오류 — 잠시 후 재시도');
}

$('startBtn').onclick=()=>{
  myLang=$('myLang').value;
  if(!room){                                    // 호스트: 방코드 생성 + QR
    room=Math.random().toString(36).slice(2,7).toUpperCase();
    const link=location.origin+location.pathname+'?room='+room;
    show('s-invite');
    new QRCode($('qrbox'),{text:link,width:200,height:200});
    $('codeTxt').textContent=room;
    $('copyBtn').onclick=()=>{navigator.clipboard?.writeText(link);$('copyBtn').textContent='복사됨!';};
  }else{                                         // 참가자
    show('s-chat');
  }
  connect();
};

// 텍스트 전송
function sendText(){
  const v=$('textIn').value.trim(); if(!v)return;
  addMsg(v,'',true); pub({type:'msg',text:v,lang:myLang}); $('textIn').value='';
}
$('sendBtn').onclick=sendText;
$('textIn').addEventListener('keydown',e=>{if(e.key==='Enter')sendText();});

// 음성 (지원 브라우저만)
let rec=null,listening=false;
$('mic').onclick=()=>{
  if(!SR){ $('status').textContent='이 브라우저는 음성인식 미지원 — 위에 글자로 입력하세요'; return; }
  if(listening){ rec&&rec.stop(); return; }
  rec=new SR(); rec.lang=LOCALE[myLang]; rec.interimResults=true; rec.continuous=false;
  listening=true;$('mic').classList.add('live');$('mic').textContent='⏹ 듣는 중…';$('status').textContent='말씀하세요…';
  rec.onresult=e=>{
    let interim='',fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;e.results[i].isFinal?fin+=t:interim+=t;}
    $('status').textContent=fin||interim;
    if(fin){const text=fin.trim();addMsg(text,'',true);pub({type:'msg',text,lang:myLang});}
  };
  rec.onerror=e=>$('status').textContent='음성 오류: '+e.error+' — 글자로 입력해도 됩니다';
  rec.onend=()=>{listening=false;$('mic').classList.remove('live');$('mic').textContent='🎤 눌러서 말하기 (음성)';setTimeout(()=>{if(!listening)$('status').textContent='';},1500);};
};
</script>
</body>
</html>
