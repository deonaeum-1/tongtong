<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>통통 · 대면 통역</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    background:#0a0f1c;color:#e8eefc;overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;}
  .screen{flex:1;display:none;flex-direction:column;min-height:0;}
  .screen.active{display:flex;}
  h1{font-size:20px;margin:0;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:28px;text-align:center;}
  .sub{color:#8ea3c9;font-size:14px;line-height:1.6;}
  select,button{font-family:inherit;}
  select{background:#182338;color:#e8eefc;border:1px solid #26344f;border-radius:12px;padding:12px 14px;font-size:16px;width:100%;max-width:280px;}
  .btn{background:#2563eb;color:#fff;border:none;border-radius:14px;padding:15px 22px;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:280px;}
  .btn.sec{background:#182338;border:1px solid #26344f;}
  .btn:active{transform:scale(.98);}
  #qrbox{background:#fff;padding:14px;border-radius:14px;display:inline-block;}
  .code{font-family:monospace;font-size:13px;color:#8ea3c9;word-break:break-all;}
  /* chat */
  .top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #26344f;}
  .dot{width:9px;height:9px;border-radius:50%;background:#ef4444;flex:none;}
  .dot.on{background:#22c55e;}
  .chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
  .msg{max-width:80%;padding:9px 13px;border-radius:16px;font-size:16px;line-height:1.35;word-break:break-word;background:#182338;align-self:flex-start;}
  .msg.mine{align-self:flex-end;background:#2563eb;}
  .msg .orig{display:block;font-size:11px;opacity:.55;margin-top:3px;}
  .foot{padding:12px 14px 16px;border-top:1px solid #26344f;}
  .mic{width:100%;background:#2563eb;color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;}
  .mic.live{background:#ef4444;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .status{font-size:12px;color:#8ea3c9;text-align:center;min-height:16px;padding-top:8px;}
</style>
</head>
<body>
<div class="app">

  <!-- 1. 시작: 언어 선택 -->
  <div class="screen active" id="s-setup">
    <div class="center">
      <h1>🗣️ 통통</h1>
      <div class="sub" id="setupSub">폰을 마주 대고, 서로의 말을 실시간으로 통역해요.<br>먼저 내 언어를 골라주세요.</div>
      <select id="myLang">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="ja">日本語</option>
        <option value="zh">中文</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="vi">Tiếng Việt</option>
        <option value="th">ไทย</option>
      </select>
      <button class="btn" id="startBtn">대화 시작</button>
    </div>
  </div>

  <!-- 2. 호스트: QR/링크로 초대 -->
  <div class="screen" id="s-invite">
    <div class="center">
      <h1>상대를 초대하세요</h1>
      <div class="sub">상대가 이 QR을 카메라로 찍으면<br>바로 연결돼요.</div>
      <div id="qrbox"></div>
      <button class="btn sec" id="copyBtn">링크 복사하기</button>
      <div class="sub" id="waitMsg">상대 연결을 기다리는 중…</div>
    </div>
  </div>

  <!-- 3. 채팅 -->
  <div class="screen" id="s-chat">
    <div class="top"><span class="dot" id="dot"></span><b id="peerInfo">연결 중…</b></div>
    <div class="chat" id="chat"></div>
    <div class="foot">
      <button class="mic" id="mic">🎤 눌러서 말하기</button>
      <div class="status" id="status"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const LOCALE={ko:'ko-KR',en:'en-US',ja:'ja-JP',zh:'zh-CN',es:'es-ES',fr:'fr-FR',vi:'vi-VN',th:'th-TH'};
const LABEL={ko:'한국어',en:'English',ja:'日本語',zh:'中文',es:'Español',fr:'Français',vi:'Tiếng Việt',th:'ไทย'};
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}

let myLang='ko', peerLang='en', conn=null, peer=null;

// 서로 다른 망(LTE↔와이파이)에서도 연결되도록 STUN + 무료 TURN 중계 설정
const PEER_OPTS={config:{iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun.relay.metered.ca:80'},
  {urls:'turn:staticauth.openrelay.metered.ca:80',username:'openrelayproject',credential:'openrelayprojectsecret'},
  {urls:'turn:staticauth.openrelay.metered.ca:443',username:'openrelayproject',credential:'openrelayprojectsecret'},
  {urls:'turn:staticauth.openrelay.metered.ca:443?transport=tcp',username:'openrelayproject',credential:'openrelayprojectsecret'}
]}};

// URL로 초대받았는지 확인
const params=new URLSearchParams(location.search);
const joinHost=params.get('peer');
if(joinHost){ $('setupSub').innerHTML='초대를 받았어요! 내 언어만 고르면 바로 연결돼요.'; $('startBtn').textContent='연결하기'; }

async function translate(text,from,to){
  if(from===to)return text;
  try{
    const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
    const j=await r.json();
    return j?.responseData?.translatedText||text;
  }catch(e){return text;}
}
function speak(text,lang){try{const u=new SpeechSynthesisUtterance(text);u.lang=LOCALE[lang]||'en-US';speechSynthesis.speak(u);}catch(e){}}

function addMsg(main,orig,mine){
  const d=document.createElement('div');
  d.className='msg'+(mine?' mine':'');
  d.innerHTML=`<span>${main}</span>`+(orig&&orig!==main?`<span class="orig">${orig}</span>`:'');
  $('chat').appendChild(d); $('chat').scrollTop=$('chat').scrollHeight;
}

// 상대 메시지 수신
async function onData(d){
  if(d.type==='hello'){ peerLang=d.lang; $('peerInfo').textContent=`상대: ${LABEL[peerLang]||peerLang}`; return; }
  if(d.type==='msg'){
    const t=await translate(d.text, d.lang, myLang);
    addMsg(t, d.text, false);
    speak(t, myLang);
  }
}
function bindConn(c){
  conn=c;
  c.on('open',()=>{ $('dot').classList.add('on'); c.send({type:'hello',lang:myLang}); show('s-chat'); });
  c.on('data',onData);
  c.on('close',()=>{ $('dot').classList.remove('on'); $('peerInfo').textContent='연결 끊김'; });
  c.on('error',e=>$('status').textContent='연결 오류: '+e);
}

function startPeer(){
  peer=new Peer(undefined,PEER_OPTS);
  peer.on('open',id=>{
    if(joinHost){                       // 참가자: 호스트에 연결
      show('s-chat'); $('peerInfo').textContent='연결 중…';
      bindConn(peer.connect(joinHost,{reliable:true}));
    }else{                              // 호스트: QR 표시
      const link=location.origin+location.pathname+'?peer='+id;
      show('s-invite');
      new QRCode($('qrbox'),{text:link,width:200,height:200});
      $('copyBtn').onclick=()=>{navigator.clipboard?.writeText(link);$('copyBtn').textContent='복사됨!';};
      peer.on('connection',c=>bindConn(c));
    }
  });
  peer.on('error',e=>$('status').textContent='오류: '+e.type+' — 새로고침 후 다시 시도해보세요');
}

$('startBtn').onclick=()=>{
  myLang=$('myLang').value;
  if(!SR){ alert('이 브라우저는 음성인식을 지원하지 않아요. 안드로이드/PC의 Chrome을 권장합니다.'); }
  startPeer();
};

// 마이크
let rec=null,listening=false;
$('mic').onclick=()=>{
  if(!SR){ $('status').textContent='음성인식 미지원 (Chrome 권장)'; return; }
  if(listening){ rec&&rec.stop(); return; }
  rec=new SR(); rec.lang=LOCALE[myLang]; rec.interimResults=true; rec.continuous=false;
  listening=true; $('mic').classList.add('live'); $('mic').textContent='⏹ 듣는 중…'; $('status').textContent='말씀하세요…';
  rec.onresult=e=>{
    let interim='',fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;e.results[i].isFinal?fin+=t:interim+=t;}
    $('status').textContent=fin||interim;
    if(fin){ const text=fin.trim(); addMsg(text,'',true); conn&&conn.open&&conn.send({type:'msg',text,lang:myLang}); }
  };
  rec.onerror=e=>$('status').textContent='오류: '+e.error;
  rec.onend=()=>{listening=false;$('mic').classList.remove('live');$('mic').textContent='🎤 눌러서 말하기';setTimeout(()=>{if(!listening)$('status').textContent='';},1500);};
};
</script>
</body>
</html>
